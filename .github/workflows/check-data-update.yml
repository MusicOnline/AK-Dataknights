name: Get ArknightsAssets/ArknightsGamedata latest commit SHA
on:
  schedule:
    # Every 15 minutes
    - cron: "0/15 * * * *"
jobs:
  get-commit-sha:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_SCOPED_TOKEN }}
      - name: Fetch latest gamedata commit SHA
        run: |
          SHA=$(curl -sL https://api.github.com/repos/ArknightsAssets/ArknightsGamedata/commits/master | jq -r ".sha")
          if [ "$SHA" != "null" ]; then
            echo $SHA > data/.game-data-sha
          fi
      - name: Check for modified commit SHA
        id: git-check
        run: echo "modified=$([ -z "`git status --porcelain`" ] && echo "false" || echo "true")" >> $GITHUB_OUTPUT
      - name: Commit latest commit SHA
        if: steps.git-check.outputs.modified == 'true'
        run: |
          git config --global user.name 'Mizuki'
          git config --global user.email 'mizuki@arknights'
          git add data/.game-data-sha
          git commit -m "chore: update latest ArknightsGamedata commit SHA" \
            -m "This is an automated commit triggered by GitHub Actions. Data repository: ArknightsAssets/ArknightsGamedata"
      - name: Push commits
        if: steps.git-check.outputs.modified == 'true'
        run: |
          git push
