name: Deploy SSG to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows running this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Checkout Arknights gamedata
        uses: actions/checkout@v4
        with:
          repository: ArknightsAssets/ArknightsGamedata
          path: ArknightsGamedata
      - name: Set environment variables
        run: |
          echo "GAME_DATA_ROOT_PATH=$(echo $GITHUB_WORKSPACE)/ArknightsGamedata" >> $GITHUB_ENV
          echo "ENABLE_SSR=true" >> $GITHUB_ENV
          echo "NUXT_APP_BASE_URL=/$(echo ${GITHUB_REPOSITORY##*/})/" >> $GITHUB_ENV
          echo "NUXT_PUBLIC_FULL_BASE_URL=https://$(echo ${GITHUB_REPOSITORY_OWNER}).github.io//$(echo ${GITHUB_REPOSITORY##*/})" >> $GITHUB_ENV
          echo "NUXT_PUBLIC_COMMIT_BASE_URL=https://github.com/MusicOnline/AK-Dataknights/commit" >> $GITHUB_ENV
      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/pnpm-lock.yaml" ]; then
            echo "manager=pnpm" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine packager manager"
            exit 1
          fi
      # Must be done before Setup Node
      - uses: pnpm/action-setup@v4
        name: Install pnpm
        if: ${{ steps.detect-package-manager.outputs.manager == 'pnpm' }}
        with:
          version: latest
          run_install: false
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: ${{ steps.detect-package-manager.outputs.manager }}
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            dist
            .nuxt
          key: ${{ runner.os }}-nuxt-build-${{ hashFiles('dist') }}
          restore-keys: |
            ${{ runner.os }}-nuxt-build-
      - name: Install dependencies
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}
      - name: Prepare nuxt (postinstall)
        run: ${{ steps.detect-package-manager.outputs.manager }} run prepare-nuxt
      - name: Generate static site
        run: ${{ steps.detect-package-manager.outputs.manager }} run build && ${{ steps.detect-package-manager.outputs.manager }} run generate
        env:
          NODE_OPTIONS: --max_old_space_size=8192
          NITRO_PRESET: github_pages
      - name: Upload static output for performance tests
        uses: actions/upload-artifact@v4
        with:
          name: nuxt-static-output
          path: .output/public
          retention-days: 2
          if-no-files-found: error
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  # Performance tests (reuse build output; no second generate)
  navigation-performance:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Download static site from build job
        uses: actions/download-artifact@v4
        with:
          name: nuxt-static-output
          path: .output/public
      - name: Stage site under GitHub Pages path
        run: |
          mkdir -p "staging/${{ github.event.repository.name }}"
          cp -a .output/public/. "staging/${{ github.event.repository.name }}/"
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Run navigation performance tests
        run: pnpm run test:performance
        env:
          PERF_BASE_URL: http://127.0.0.1:3000
          PERF_SERVE_ROOT: ${{ github.workspace }}/staging
          PERF_BASE_PATH: /${{ github.event.repository.name }}/
          PERF_MAX_DOCUMENT_LOAD_MS: "120000"
          PERF_MAX_CLIENT_NAV_MS: "120000"
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
